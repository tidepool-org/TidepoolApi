type: object
title: bucket.v1
description: 'bucket containing an hour of bgm or cgm aggregations'
properties:
  date:
    type: string
    format: date-time
  lastRecordTime:
    type: string
    format: date-time
  data:
    oneOf:
      - $ref: './bgm/bgmBucketData.v1.yaml'
      - $ref: './cgm/cgmBucketData.v1.yaml'
      - $ref: './continuous/continuousBucketData.v1.yaml'

required:
  - date
  - lateRecordTime
