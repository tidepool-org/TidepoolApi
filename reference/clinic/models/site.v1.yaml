type: 'object'
title: 'Site'
description: 'A clinic''s phyical or logical location.'
properties:
  id:
    title: 'Object Id'
    type: 'string'
    description: 'String representation of a resource id'
    minLength: 24
    maxLength: 24
    pattern: '^[a-f0-9]{24}$'
    readOnly: true
  name:
    type: 'string'
    description: 'The site description.'
    minLength: 1
    maxLength: 200
    pattern: '^[[:graph:]\p{L}\p{N}][[:graph:]\p{L}\p{N} ]*$'
required:
  - id
  - name
